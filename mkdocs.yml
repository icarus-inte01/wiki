site_name: 개인 위키
site_url: https://icarus-inte01.github.io/wiki
site_description: 개인 기술 위키 — 개발, 일상, 프로젝트 노트
site_author: icarus

repo_url: https://github.com/icarus-inte01/wiki
repo_name: icarus-inte01/wiki

theme:
  name: material
  language: ko
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

nav:
  - 홈: index.md
  - 개발:
    - dev/index.md
    - Mermaid 예제: dev/mermaid-example.md
    - MCP 개념: dev/mcp.md
    - JSON vs Protobuf 비교 분석: dev/json-protobuf.md
    - Python:
      - Python venv: dev/python/venv.md
      - pip 패키지: dev/python/pip.md
  - 일상/메모:
    - life/index.md
  - 프로젝트:
    - projects/index.md
    - 뉴스 수집 및 요약 시스템: projects/design-news.md
    - KIS Stock API: projects/stock-api.md
    - Wiki MCP Server: projects/wiki-mcp.md

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid-diagram
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true

extra_css:
  - extra.css

extra_javascript:
  - extra.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/icarus-inte01
  generator: false

copyright: CC BY-NC 4.0
